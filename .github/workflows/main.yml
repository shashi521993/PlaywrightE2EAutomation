name: Playwright E2E Automation
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write  # Required for peaceiris/actions-gh-pages

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore E2EShoppingAutomation/E2EShoppingAutomation.csproj

    - name: Build project
      run: dotnet build E2EShoppingAutomation/E2EShoppingAutomation.csproj --configuration Debug -p:NoWarn=CS8618

    - name: Ensure Playwright browsers are installed
      run: |
        pwsh E2EShoppingAutomation/bin/Debug/net8.0/playwright.ps1 install --with-deps

    - name: Run tests
      env:
        ALLURE_RESULTS_DIRECTORY: allure-results
      run: |
        dotnet test E2EShoppingAutomation/E2EShoppingAutomation.csproj \
          --configuration Debug \
          --no-build \
          --settings E2EShoppingAutomation/playwright.runsettings \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./TestResults

    - name: Generate Allure Report
      if: always() # Ensures report is generated even if tests fail
      run: |
        npm install -g allure-commandline --no-audit --no-fund --silent
        
        # Checking local build path for results
        RESULTS_PATH="E2EShoppingAutomation/bin/Debug/net8.0/allure-results"
        
        if [ -d "$RESULTS_PATH" ]; then
          allure generate "$RESULTS_PATH" -o AllureReport --clean
        else
          # Fallback search if path differs
          FOUND_DIR=$(find . -type d -name "allure-results" | head -n 1)
          allure generate "$FOUND_DIR" -o AllureReport --clean
        fi

    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./AllureReport

    - name: Upload TRX Results (Backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-trx
        path: TestResults/