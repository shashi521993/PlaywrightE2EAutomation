name: Playwright E2E Automation
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build E2EShoppingAutomation/E2EShoppingAutomation.csproj --configuration Debug -p:NoWarn=CS8618

    - name: Install Playwright Browsers
      run: |
        pwsh ./E2EShoppingAutomation/bin/Debug/net8.0/playwright.ps1 install --with-deps

    - name: Run Playwright Tests
      if: always()
      run: |
        dotnet test E2EShoppingAutomation/E2EShoppingAutomation.csproj \
          --configuration Debug \
          --no-build \
          --settings E2EShoppingAutomation/playwright.runsettings \
          --logger "trx;LogFileName=test-results.trx"

    - name: Generate HTML Test Report (trx -> html)
      if: always()
      run: |
        set -e
        # install a local tool to convert TRX to HTML
        dotnet tool install --tool-path ./tools trx2html --version 1.1.0 || true
        # find the generated TRX file
        TRX_PATH=$(ls **/test-results.trx 2>/dev/null | head -n1 || true)
        if [ -z "$TRX_PATH" ]; then
          echo "No TRX file found, skipping HTML report generation."
        else
          mkdir -p E2EShoppingAutomation/Reports
          ./tools/trx2html -i "$TRX_PATH" -o E2EShoppingAutomation/Reports/test-report.html
          echo "HTML report generated at E2EShoppingAutomation/Reports/test-report.html"
        fi

    - name: Upload Screenshots Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-execution-screenshots
        path: E2EShoppingAutomation/Screenshots/
        retention-days: 7

    - name: Upload Test Results (TRX)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "**/test-results.trx"