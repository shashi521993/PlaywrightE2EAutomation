name: Playwright E2E Automation
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore E2EShoppingAutomation/E2EShoppingAutomation.csproj

    - name: Build project
      run: dotnet build E2EShoppingAutomation/E2EShoppingAutomation.csproj --configuration Debug -p:NoWarn=CS8618

    - name: Ensure Playwright browsers are installed
      run: |
        set -euo pipefail
        SCRIPT=./E2EShoppingAutomation/bin/Debug/net8.0/playwright.ps1
        if [ -f "$SCRIPT" ]; then
          echo "Found Playwright script at $SCRIPT"
          pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "$SCRIPT" install --with-deps
        else
          echo "$SCRIPT not found, falling back to npx if available"
          if command -v npx >/dev/null 2>&1; then
            npx playwright install --with-deps
          else
            echo "No Playwright installer found (script or npx). Ensure Playwright is available." >&2
            exit 1
          fi
        fi

    - name: Run tests and produce TRX
      run: |
        mkdir -p E2EShoppingAutomation/TestResults
        dotnet test E2EShoppingAutomation/E2EShoppingAutomation.csproj \
          --configuration Debug \
          --no-build \
          --settings E2EShoppingAutomation/playwright.runsettings \
          --logger "trx;LogFileName=E2EShoppingAutomation/TestResults/test-results.trx"

    - name: Install ReportGenerator tool
      run: dotnet tool install --tool-path ./tools dotnet-reportgenerator-globaltool || true

    - name: Generate HTML Test Report
      run: |
        set -euo pipefail
        echo "-- Debug: locate TRX files in workspace --"
        TRX_LIST=$(find . -type f -name '*.trx' -print | tr '\n' ';' | sed 's/;$//')

        if [ -z "$TRX_LIST" ]; then
          echo "No TRX files found in workspace. Skipping HTML report generation."
          exit 0
        fi

        echo "Found TRX files: $TRX_LIST"
        mkdir -p E2EShoppingAutomation/Reports
        mkdir -p E2EShoppingAutomation/Reports/history

        if [ -x ./tools/reportgenerator ]; then
          echo "Using ./tools/reportgenerator"
          ./tools/reportgenerator -reports:"$TRX_LIST" -targetdir:./E2EShoppingAutomation/Reports -reporttypes:"Html;HtmlSummary" -historydir:./E2EShoppingAutomation/Reports/history
        else
          echo "./tools/reportgenerator not found or not executable. Trying 'dotnet tool run reportgenerator'"
          dotnet tool run reportgenerator -- -reports:"$TRX_LIST" -targetdir:./E2EShoppingAutomation/Reports -reporttypes:"Html;HtmlSummary" -historydir:./E2EShoppingAutomation/Reports/history
        fi

    - name: Upload HTML report artifact
      uses: actions/upload-artifact@v4
      with:
        name: html-report
        path: E2EShoppingAutomation/Reports/
        if-no-files-found: warn
        retention-days: 7

    - name: Upload Test Results (TRX)
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: E2EShoppingAutomation/TestResults/
        if-no-files-found: warn
        retention-days: 7

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: E2EShoppingAutomation/Screenshots/
        if-no-files-found: warn
        retention-days: 7
